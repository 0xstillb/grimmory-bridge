name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS universal
            os: macos-latest
            tauri_args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            sidecar_triple: universal-apple-darwin
          - name: Windows x64
            os: windows-latest
            tauri_args: --target x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            sidecar_triple: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Install Python build deps
        run: python -m pip install --upgrade pip pyinstaller cryptography -r requirements.txt

      - name: Build sidecar
        run: python scripts/build-sidecar.py --triple ${{ matrix.sidecar_triple }}

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Grimmory Bridge ${{ github.ref_name }}
          releaseBody: |
            Automated release for ${{ github.ref_name }}.
            Includes Windows x64 (.msi/.exe) and macOS universal (.dmg) artifacts.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.tauri_args }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: false
          updaterJsonKeepUniversal: true
